#GEOMETRY & TIME STEPPING
geometry:
  x_min: -5.0
  x_max: 8.0
  T_max: 3.0  

time_stepping:
  zones:
    - {t_end: 0.05, dt: 0.01}  
    - {t_end: 0.30, dt: 0.05}  
    - {t_end: 3.00, dt: 0.10}  
    
#PHYSICAL BOUNDS
physics_ranges:
  v: [0.5, 1.0]
  D: [0.01, 0.2]
  mu: [0.0, 1.0]
  A: [0.7, 1.0]
  x0: [0.0, 0.0]
  sigma: [0.4, 0.8]
  k: [1.0, 3.0]
  
#MODEL
model:
  branch_depth: 6
  branch_width: 256
  trunk_depth: 5
  trunk_width: 256
  latent_dim: 256
  nFourier: 128
  sFourier: [0.0, 1.0, 2.0, 3.0, 5.0, 8.0, 12.0, 16.0, 24.0]

#TRAINING 
training:
  learning_rate: 0.0001
  n_warmup: 7000 
  n_iters_per_step: 6000
  n_iters_correction: 8000 
  n_sample: 12288      
  batch_size: 4096
  nb_loop: 3
  max_retry: 4 
  threshold: 0.03 
  rolling_window: 2000
  
#WEIGHTS
loss_weights:
  weight_ic_init: 500.0     # Pour le début de la rampe
  weight_ic_final: 100.0    # Pour le mode NTK
  weight_bc: 100.0
  first_w_res: 500.0        # Cible w_res à atteindre à t=0.3

#AUDIT
audit:
  Nx_solver: 500
  Nx_audit: 500
  Nt_audit: 200
  save_dir: "outputs/checkpoints_shared"