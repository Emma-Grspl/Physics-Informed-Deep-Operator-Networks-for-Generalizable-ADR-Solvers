name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements-base.txt pytest

        - name: Run tests
          run: python -m pytest -q code/tests

        - name: Verify source compilation
          run: python -m compileall code/benchmarks code/code_experiments code/src code/src_jax code/tests
